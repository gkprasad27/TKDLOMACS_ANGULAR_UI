<a  mat-list-item [ngStyle]="{'padding-left': (depth * 12) + 'px'}" (click)="onItemSelected(item)"
  [ngClass]="{'active': item.route ? router.isActive(item.route, true): false, 'expanded': expanded}"
  class="menu-list-item">
  <mat-icon class="routeIcon pr-2">{{item.iconName}}</mat-icon>
  <span class="pl-2"> {{item.displayName}} </span>
  @if (item.children && item.children.length) {
    <span fxFlex>
      <span fxFlex></span>
      <mat-icon [@indicatorRotate]="expanded ? 'expanded': 'collapsed'">
        expand_more
      </mat-icon>
    </span>
  }
</a>
@if (expanded) {
  <div>
    @for (child of item.children; track child) {
      <app-sidebar [item]="child" [depth]="depth+1">
      </app-sidebar>
    }
  </div>
}
