<mat-select [formControl]="tableMultiCtrl" placeholder="Search columns" [multiple]="true" #multiSelect>
  <ngx-mat-select-search (toggleAll)="toggleSelectAll($event)" [formControl]="tableMultiFilterCtrl">
  </ngx-mat-select-search>
  @for (bank of filteredTableMulti | async; track bank; let i = $index) {
    <mat-option [value]="bank">
      <mat-checkbox [checked]="bank.hide" (change)="checkboxCheck(i)" >
        {{ bank.label }}
      </mat-checkbox>
    </mat-option>
  }
</mat-select>
<button mat-raised-button color="accent" (click)="saveChanges()"> Save </button>
