<div class="nav"><mat-toolbar class="text-white background-color">
  <mat-toolbar-row class="d-flex justify-content-between">

    <div class="d-flex">
      @if (showExpandButtons) {
        <button mat-icon-button id="menu" (click)="openCloseMemu()">
          <mat-icon>menu</mat-icon>
        </button>
      }
      <div class="d-flex align-items-center">
        <img [routerLink]="['/dashboard']" src="assets/images/logo.png" alt="TKDLOMACS" height="25" />
        <span [routerLink]="['/dashboard']" class="px-2"  [translate]="'LOGIN.tkdlomacs'"></span>
      </div>
    </div>

    @if (commonService.routeParam) {
      <div>
        {{ ( commonService.routeParam + '.title') | translate }}
      </div>
    }

    <div class="d-flex align-items-center">
      <!-- @if (showExpandButtons) {
        <div class="d-flex mx-4">
          <span class="align-items-center d-flex">
<mat-icon>account_circle</mat-icon>
          </span>
          @if (loginUser != null) {
          <small class="mx-1 my-2"> {{loginUser.userName}} </small>
          }
        </div>
      } -->

      

      @if (showExpandButtons) {
        <div class="d-flex align-items-center pl-3">
          @if (employeeShift != null) {
          <small class="pl-2 shift-in"> {{employeeShift}} </small>
          }
        </div>
        <div class="d-flex">
          <span class="align-items-center d-flex pl-3"><mat-icon>account_circle</mat-icon></span>
          @if (loginUser != null) {
          <button class="text-white" mat-button [matMenuTriggerFor]="menu">{{loginUser.userName}}</button>
          }
          <mat-menu #menu="matMenu" class="mt-2 bg-light">
          <button *ngIf="shiftButton" (click)="shift()"  mat-menu-item> {{ shiftButton }}</button>
            @if (showExpandButtons) {
            <button (click)="logout()" mat-menu-item>Logout</button>
            }
          </mat-menu>
        </div>
        }
    </div>

  </mat-toolbar-row>
</mat-toolbar>
</div>
